name: Build Wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install "maturin>=1.7"

      - name: Read runtime pin
        id: rev
        shell: bash
        run: |
          SHA=$(cat senza-pkg/runtime.lock)
          echo "rev=$SHA" >> $GITHUB_OUTPUT
          echo "Pinned runtime SHA: $SHA"

      - name: Inject rev into Cargo.toml
        shell: bash
        run: perl -pi -e "s/PLACEHOLDER/${{ steps.rev.outputs.rev }}/g" Cargo.toml

      - name: Configure git credentials for private crate deps
        shell: bash
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << CARGO_EOF
          [net]
          git-fetch-with-cli = true
          CARGO_EOF

      - name: Build wheel
        shell: bash
        run: |
          maturin build --release
          echo "WHEEL=$(find $GITHUB_WORKSPACE/target/wheels -name 'senza*.whl' | head -1)" >> $GITHUB_ENV

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: senza-wheel-${{ matrix.target }}
          path: ${{ env.WHEEL }}

      - name: Install wheel and verify import
        shell: bash
        run: |
          pip install ${{ env.WHEEL }}
          python -c "import senza; print('version:', senza.version()); print(repr(senza.HarnessBuilder('gpt-4o')))"

      - name: Check stubs
        shell: bash
        run: python scripts/check_stubs.py

      - name: Copy wheel to dist
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ env.WHEEL }} dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*.whl

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -la dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
