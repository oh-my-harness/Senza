name: Build Wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            can_test: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            can_test: false
          - os: macos-14
            target: aarch64-apple-darwin
            can_test: true
          - os: macos-14
            target: x86_64-apple-darwin
            can_test: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            can_test: true

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Read runtime pin
        id: rev
        shell: bash
        run: |
          SHA=$(cat senza-pkg/runtime.lock)
          echo "rev=$SHA" >> $GITHUB_OUTPUT
          echo "Pinned runtime SHA: $SHA"

      - name: Inject rev into Cargo.toml
        shell: bash
        run: perl -pi -e "s/PLACEHOLDER/${{ steps.rev.outputs.rev }}/g" Cargo.toml

      - name: Configure git credentials for private crate deps
        shell: bash
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << CARGO_EOF
          [net]
          git-fetch-with-cli = true
          CARGO_EOF
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build wheel
        id: build
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          target: ${{ matrix.target }}
          manylinux: 2_28
          before-script-linux: |
            git config --global credential.helper store
            printf 'https://x-access-token:%s@github.com\n' "${{ secrets.RUNTIME_PAT }}" > ~/.git-credentials
            mkdir -p ~/.cargo
            printf '[net]\ngit-fetch-with-cli = true\n' > ~/.cargo/config.toml

      - name: Locate wheel
        shell: bash
        run: |
          wheels=(target/wheels/senza*.whl)
          [ -e "${wheels[0]}" ] || { echo "No wheel found in target/wheels/"; ls -la target/wheels/; exit 1; }
          echo "WHEEL=${wheels[0]}" >> $GITHUB_ENV

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: senza-wheel-${{ matrix.target }}
          path: ${{ env.WHEEL }}

      - name: Install wheel and verify import
        if: matrix.can_test
        shell: bash
        run: |
          pip install ${{ env.WHEEL }}
          python -c "import senza; print('version:', senza.version()); print(repr(senza.HarnessBuilder('gpt-4o')))"

      - name: Check stubs
        if: matrix.can_test
        shell: bash
        run: python scripts/check_stubs.py

      - name: Copy wheel to dist
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ env.WHEEL }} dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*.whl

  # ── Multi-version test matrix (issue #17) ──────────────────────────────────
  # Build a test-utils wheel on Linux x86_64 and run the full pytest suite
  # against Python 3.9–3.14 to verify cross-version compatibility.
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Read runtime pin
        id: rev
        shell: bash
        run: |
          SHA=$(cat senza-pkg/runtime.lock)
          echo "rev=$SHA" >> $GITHUB_OUTPUT

      - name: Inject rev into Cargo.toml
        shell: bash
        run: perl -pi -e "s/PLACEHOLDER/${{ steps.rev.outputs.rev }}/g" Cargo.toml

      - name: Configure git credentials for private crate deps
        shell: bash
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << CARGO_EOF
          [net]
          git-fetch-with-cli = true
          CARGO_EOF
      - name: Create virtualenv
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install test dependencies
        run: pip install pytest pytest-timeout maturin
      - name: Build test-utils wheel
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release --features test-utils
          manylinux: 2_28
          before-script-linux: |
            git config --global credential.helper store
            printf 'https://x-access-token:%s@github.com\n' "${{ secrets.RUNTIME_PAT }}" > ~/.git-credentials
            mkdir -p ~/.cargo
            printf '[net]\ngit-fetch-with-cli = true\n' > ~/.cargo/config.toml

      - name: Run tests
        run: python -m pytest tests/ -q --timeout=30

      - name: Check stubs
        run: python scripts/check_stubs.py

  # ── Android cross-compile (arm64 + x86_64) ─────────────────────────────────
  # Builds Senza wheels for Android, used by Lumo's Chaquopy integration.
  # These wheels are not published to PyPI (no Android runner on PyPI);
  # they go only to GitHub Releases.
  android:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-linux-android
            abi_tag: arm64_v8a
          - target: x86_64-linux-android
            abi_tag: x86_64
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Read runtime pin
        id: rev
        shell: bash
        run: |
          SHA=$(cat senza-pkg/runtime.lock)
          echo "rev=$SHA" >> $GITHUB_OUTPUT

      - name: Inject rev into Cargo.toml
        shell: bash
        run: perl -pi -e "s/PLACEHOLDER/${{ steps.rev.outputs.rev }}/g" Cargo.toml

      - name: Configure git credentials for private crate deps
        shell: bash
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          printf '[net]\ngit-fetch-with-cli = true\n' > ~/.cargo/config.toml

      - name: Set up Android NDK
        uses: nttld/setup-ndk@v1
        id: setup_ndk
        with:
          ndk-version: r27c

      - name: Create Python stubs in NDK sysroot
        shell: bash
        env:
          NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          TARGET: ${{ matrix.target }}
        run: |
          SYSROOT="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          case "$TARGET" in
            aarch64-linux-android) LIB_DIR="$SYSROOT/usr/lib/aarch64-linux-android" ;;
            x86_64-linux-android)  LIB_DIR="$SYSROOT/usr/lib/x86_64-linux-android" ;;
          esac
          # Empty static lib stub — lets the linker find -lpython3
          touch /tmp/empty.c
          "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-ar" rcs "$LIB_DIR/libpython3.a" /tmp/empty.c
          # Minimal .so stub — lets the linker find -lpython3.12
          "$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/bin/${TARGET}24-clang" -shared -x c -o "$LIB_DIR/libpython3.12.so" /dev/null
          echo "Created Python stubs in $LIB_DIR"

      - name: Write .cargo/config.toml
        shell: bash
        env:
          NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          TARGET: ${{ matrix.target }}
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          mkdir -p .cargo
          cat > .cargo/config.toml << EOF
          [net]
          git-fetch-with-cli = true

          [target.${TARGET}]
          linker = "$TOOLCHAIN/bin/${TARGET}24-clang"
          ar = "$TOOLCHAIN/bin/llvm-ar"
          rustflags = ["-C", "link-arg=-Wl,--no-as-needed", "-C", "link-arg=-lpython3.12"]
          EOF

      - name: Build wheel
        shell: bash
        env:
          NDK_HOME: ${{ steps.setup_ndk.outputs.ndk-path }}
          TARGET: ${{ matrix.target }}
        run: |
          TOOLCHAIN="$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64"
          TARGET_US="${TARGET//-/_}"
          export "CC_${TARGET_US}=$TOOLCHAIN/bin/${TARGET}24-clang"
          export "CXX_${TARGET_US}=$TOOLCHAIN/bin/${TARGET}24-clang++"
          export "AR_${TARGET_US}=$TOOLCHAIN/bin/llvm-ar"
          export PYO3_PYTHON=python3
          python3 -m maturin build --release --target "$TARGET"

      - name: Locate wheel
        shell: bash
        env:
          ABI_TAG: ${{ matrix.abi_tag }}
        run: |
          wheels=(target/wheels/senza*${ABI_TAG}*.whl)
          [ -e "${wheels[0]}" ] || { echo "No wheel found"; ls -la target/wheels/; exit 1; }
          echo "WHEEL=${wheels[0]}" >> $GITHUB_ENV

      - name: Copy wheel to dist
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ env.WHEEL }} dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-android-${{ matrix.abi_tag }}
          path: dist/*.whl

  release:
    needs: [build, test, android]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -la dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI (exclude Android wheels)
        run: |
          pip install twine
          # Android wheels go to GitHub Releases only, not PyPI
          shopt -s extglob
          twine upload dist/!(*android*).whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
