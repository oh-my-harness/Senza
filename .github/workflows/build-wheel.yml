name: Build Wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Read runtime pin
        id: rev
        shell: bash
        run: |
          SHA=$(cat senza-pkg/runtime.lock)
          echo "rev=$SHA" >> $GITHUB_OUTPUT
          echo "Pinned runtime SHA: $SHA"

      - name: Inject rev into Cargo.toml
        shell: bash
        run: perl -pi -e "s/PLACEHOLDER/${{ steps.rev.outputs.rev }}/g" Cargo.toml

      - name: Configure git credentials for private crate deps
        shell: bash
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << CARGO_EOF
          [net]
          git-fetch-with-cli = true
          CARGO_EOF
      - name: cargo fmt --check
        run: cargo fmt --check

      - name: cargo clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Build wheel
        id: build
        uses: PyO3/maturin-action@v1
        with:
          command: build
          args: --release
          target: ${{ matrix.target }}
          manylinux: 2_28
          before-script-linux: |
            git config --global credential.helper store
            printf 'https://x-access-token:%s@github.com\n' "${{ secrets.RUNTIME_PAT }}" > ~/.git-credentials
            mkdir -p ~/.cargo
            printf '[net]\ngit-fetch-with-cli = true\n' > ~/.cargo/config.toml

      - name: Locate wheel
        shell: bash
        run: |
          wheels=(target/wheels/senza*.whl)
          [ -e "${wheels[0]}" ] || { echo "No wheel found in target/wheels/"; ls -la target/wheels/; exit 1; }
          echo "WHEEL=${wheels[0]}" >> $GITHUB_ENV

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: senza-wheel-${{ matrix.target }}
          path: ${{ env.WHEEL }}

      - name: Install wheel and verify import
        shell: bash
        run: |
          pip install ${{ env.WHEEL }}
          python -c "import senza; print('version:', senza.version()); print(repr(senza.HarnessBuilder('gpt-4o')))"

      - name: Check stubs
        shell: bash
        run: python scripts/check_stubs.py

      - name: Copy wheel to dist
        shell: bash
        run: |
          mkdir -p dist
          cp ${{ env.WHEEL }} dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*.whl

  # ── Multi-version test matrix (issue #17) ──────────────────────────────────
  # Build a test-utils wheel on Linux x86_64 and run the full pytest suite
  # against Python 3.9–3.14 to verify cross-version compatibility.
  test:
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13", "3.14"]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Rust components
        run: rustup component add rustfmt clippy

      - name: Read runtime pin
        id: rev
        shell: bash
        run: |
          SHA=$(cat senza-pkg/runtime.lock)
          echo "rev=$SHA" >> $GITHUB_OUTPUT

      - name: Inject rev into Cargo.toml
        shell: bash
        run: perl -pi -e "s/PLACEHOLDER/${{ steps.rev.outputs.rev }}/g" Cargo.toml

      - name: Configure git credentials for private crate deps
        shell: bash
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << CARGO_EOF
          [net]
          git-fetch-with-cli = true
          CARGO_EOF
      - name: Create virtualenv
        shell: bash
        run: |
          python -m venv .venv
          echo "VIRTUAL_ENV=$PWD/.venv" >> $GITHUB_ENV
          echo "$PWD/.venv/bin" >> $GITHUB_PATH
      - name: Install test dependencies
        run: pip install pytest pytest-timeout maturin
      - name: Build test-utils wheel
        uses: PyO3/maturin-action@v1
        with:
          command: develop
          args: --release --features test-utils
          manylinux: 2_28
          before-script-linux: |
            git config --global credential.helper store
            printf 'https://x-access-token:%s@github.com\n' "${{ secrets.RUNTIME_PAT }}" > ~/.git-credentials
            mkdir -p ~/.cargo
            printf '[net]\ngit-fetch-with-cli = true\n' > ~/.cargo/config.toml

      - name: Run tests
        run: python -m pytest tests/ -q --timeout=30

      - name: Check stubs
        run: python scripts/check_stubs.py

  release:
    needs: [build, test]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist

      - name: List wheels
        run: ls -la dist/

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI
        run: |
          pip install twine
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
