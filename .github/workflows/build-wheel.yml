name: Build Wheel

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      runtime_rev:
        description: "llm-harness-runtime git rev (commit SHA or tag)"
        required: false
        default: ""

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout Senza repo
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: pip install "maturin>=1.7"

      - name: Determine runtime rev
        id: rev
        run: |
          if [ -n "${{ github.event.inputs.runtime_rev }}" ]; then
            echo "rev=${{ github.event.inputs.runtime_rev }}" >> $GITHUB_OUTPUT
          else
            echo "rev=main" >> $GITHUB_OUTPUT
          fi

      - name: Checkout llm-harness-runtime
        uses: actions/checkout@v4
        with:
          repository: oh-my-harness/llm-harness-runtime
          token: ${{ secrets.RUNTIME_PAT }}
          path: runtime-src
          fetch-depth: 0

      - name: Checkout specific rev
        run: |
          cd runtime-src
          git checkout ${{ steps.rev.outputs.rev }}

      - name: Copy Senza packaging files into runtime crate
        run: |
          cp pyproject.toml runtime-src/crates/llm-harness-py/pyproject.toml
          cp -r senza-pkg runtime-src/crates/llm-harness-py/senza-pkg

      - name: Configure git credentials for private crate deps
        run: |
          git config --global credential.helper store
          echo "https://x-access-token:${{ secrets.RUNTIME_PAT }}@github.com" > ~/.git-credentials
          mkdir -p ~/.cargo
          cat > ~/.cargo/config.toml << CARGO_EOF
          [net]
          git-fetch-with-cli = true
          CARGO_EOF

      - name: Build wheel
        working-directory: runtime-src/crates/llm-harness-py
        run: |
          maturin build --release
          echo "WHEEL=$(find $GITHUB_WORKSPACE/runtime-src/target/wheels -name 'senza*.whl' | head -1)" >> $GITHUB_ENV

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: senza-wheel
          path: ${{ env.WHEEL }}

      - name: Install wheel and verify import
        run: |
          pip install ${{ env.WHEEL }}
          python -c "import senza; print('version:', senza.version()); print(repr(senza.HarnessBuilder('gpt-4o')))"

      - name: Copy wheel to dist
        run: |
          mkdir -p dist
          cp ${{ env.WHEEL }} dist/

      - name: Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.whl
          generate_release_notes: true

      - name: Publish to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          pip install twine
          twine upload dist/*.whl
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
