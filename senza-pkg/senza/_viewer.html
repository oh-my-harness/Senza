<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Session Viewer</title>
<style>
:root {
  --bg: #1a1a1e; --bg-2: #232328; --bg-3: #2d2d33;
  --fg: #e4e4e7; --fg-dim: #a1a1aa; --fg-muted: #71717a;
  --border: #3f3f46; --accent: #60a5fa; --accent-2: #818cf8;
  --user: #2563eb; --assistant: #059669; --tool: #d97706;
  --error: #dc2626; --thinking: #7c3aed;
  --code-bg: #18181b; --code-fg: #e4e4e7;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg); color: var(--fg); font-size: 14px; line-height: 1.6;
}
.app { display: grid; grid-template-columns: 280px 1fr; height: 100vh; }

/* Sidebar */
.sidebar {
  background: var(--bg-2); border-right: 1px solid var(--border);
  overflow-y: auto; display: flex; flex-direction: column;
}
.sidebar-header {
  padding: 16px; border-bottom: 1px solid var(--border);
  font-weight: 600; font-size: 13px; color: var(--fg-dim);
  text-transform: uppercase; letter-spacing: 0.05em;
}
.sidebar-root {
  padding: 8px 16px; font-size: 11px; color: var(--fg-muted);
  word-break: break-all; border-bottom: 1px solid var(--border);
}
.session-list { flex: 1; overflow-y: auto; }
.session-item {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: background 0.15s;
}
.session-item:hover { background: var(--bg-3); }
.session-item.active { background: var(--bg-3); border-left: 3px solid var(--accent); }
.session-item .sid { font-family: monospace; font-size: 12px; color: var(--fg); }
.session-item .smeta { font-size: 11px; color: var(--fg-muted); margin-top: 4px; }
.session-item .sname { font-weight: 500; color: var(--accent); }

/* Main */
.main { display: flex; flex-direction: column; overflow: hidden; }
.main-header {
  padding: 12px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-2); display: flex; align-items: center; gap: 16px;
  flex-wrap: wrap;
}
.main-header h1 { font-size: 15px; font-weight: 600; }
.main-header .badge {
  font-size: 11px; padding: 2px 8px; border-radius: 10px;
  background: var(--bg-3); color: var(--fg-dim);
}
.main-header .badge.model { color: var(--accent); }

/* Branch tabs */
.branch-bar {
  padding: 8px 20px; background: var(--bg-2); border-bottom: 1px solid var(--border);
  display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
}
.branch-bar .label { font-size: 11px; color: var(--fg-muted); margin-right: 4px; }
.branch-tab {
  font-family: monospace; font-size: 11px; padding: 4px 10px;
  border-radius: 4px; background: var(--bg-3); cursor: pointer;
  border: 1px solid transparent; transition: all 0.15s;
}
.branch-tab:hover { border-color: var(--border); }
.branch-tab.active { background: var(--accent); color: #000; }
.branch-tab.active-leaf::before { content: "● "; color: #4ade80; }

/* Messages */
.messages { flex: 1; overflow-y: auto; padding: 20px; }
.msg {
  margin-bottom: 16px; border-radius: 8px; padding: 12px 16px;
  background: var(--bg-2); border-left: 3px solid var(--border);
}
.msg.user { border-left-color: var(--user); }
.msg.assistant { border-left-color: var(--assistant); }
.msg.tool-result { border-left-color: var(--tool); }
.msg.compaction-summary, .msg.branch-summary { border-left-color: var(--thinking); }
.msg.custom { border-left-color: var(--fg-muted); }

.msg-header {
  display: flex; align-items: center; gap: 8px; margin-bottom: 8px;
  font-size: 12px; color: var(--fg-dim);
}
.msg-role { font-weight: 600; text-transform: capitalize; }
.msg-role.user { color: var(--user); }
.msg-role.assistant { color: var(--assistant); }
.msg-role.tool-result { color: var(--tool); }
.msg-kind {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: var(--bg-3); color: var(--fg-muted);
}
.msg-kind.progress { color: var(--accent-2); }
.msg-kind.final_answer { color: #4ade80; }
.msg-time { margin-left: auto; font-family: monospace; color: var(--fg-muted); }
.msg-error { color: var(--error); font-size: 12px; margin-top: 4px; }

.msg-usage {
  margin-top: 8px; font-size: 11px; color: var(--fg-muted);
  display: flex; gap: 12px; flex-wrap: wrap;
}
.msg-usage span { font-family: monospace; }

/* Content blocks */
.block { margin-bottom: 8px; }
.block:last-child { margin-bottom: 0; }
.block-text { white-space: pre-wrap; word-break: break-word; }
.block-text.empty { color: var(--fg-muted); font-style: italic; }

.block-thinking {
  background: rgba(124,58,237,0.08); border: 1px solid rgba(124,58,237,0.2);
  border-radius: 4px; margin: 4px 0;
}
.block-thinking summary {
  cursor: pointer; padding: 6px 10px; font-size: 12px;
  color: var(--thinking); user-select: none;
}
.block-thinking summary::marker { color: var(--thinking); }
.block-thinking .thinking-body {
  padding: 8px 12px; font-size: 13px; color: var(--fg-dim);
  white-space: pre-wrap; word-break: break-word;
}

.block-tool-use {
  background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.2);
  border-radius: 4px; margin: 4px 0; overflow: hidden;
}
.block-tool-use .tu-header {
  padding: 6px 10px; font-size: 12px; cursor: pointer;
  display: flex; align-items: center; gap: 8px; user-select: none;
}
.block-tool-use .tu-name { color: var(--tool); font-weight: 600; font-family: monospace; }
.block-tool-use .tu-id { color: var(--fg-muted); font-size: 11px; font-family: monospace; }
.block-tool-use .tu-input {
  padding: 8px 12px; font-family: monospace; font-size: 12px;
  background: var(--code-bg); color: var(--code-fg);
  white-space: pre-wrap; word-break: break-word; overflow-x: auto;
}

.block-image img { max-width: 100%; border-radius: 4px; }

.tool-result-content {
  font-family: monospace; font-size: 12px; background: var(--code-bg);
  color: var(--code-fg); padding: 8px 12px; border-radius: 4px;
  white-space: pre-wrap; word-break: break-word; overflow-x: auto;
}
.tool-result.is-error { border-left-color: var(--error); }

/* Config entries (non-message) */
.cfg-entry {
  margin-bottom: 8px; padding: 8px 12px; border-radius: 4px;
  background: var(--bg-3); font-size: 12px; color: var(--fg-dim);
  display: flex; gap: 8px; align-items: center;
}
.cfg-entry .cfg-tag {
  font-size: 10px; padding: 1px 6px; border-radius: 8px;
  background: var(--bg); color: var(--fg-muted); text-transform: uppercase;
}

.empty-state {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: var(--fg-muted); font-size: 14px;
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--border); }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">Sessions</div>
    <div class="sidebar-root" id="root-path"></div>
    <div class="session-list" id="session-list"></div>
  </aside>
  <main class="main">
    <div id="main-content" class="empty-state">Select a session</div>
  </main>
</div>

<script id="viewer-data" type="application/json">__VIEWER_DATA_JSON__</script>
<script>
(function () {
  "use strict";

  const data = JSON.parse(document.getElementById("viewer-data").textContent);
  let activeSessionIdx = -1;
  let activeBranchIdx = 0;

  const $ = (id) => document.getElementById(id);
  const esc = (s) => String(s ?? "").replace(/[&<>"']/g, (c) => (
    { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]
  ));

  function fmtTime(ts) {
    try { return new Date(ts).toLocaleString(); }
    catch { return ts; }
  }

  function shortId(id) {
    return id ? id.slice(0, 8) : "?";
  }

  // ── Render sidebar ────────────────────────────────────────────────
  function renderSidebar() {
    $("root-path").textContent = data.root;
    const list = $("session-list");
    list.innerHTML = "";
    if (!data.sessions.length) {
      list.innerHTML = '<div style="padding:16px;color:var(--fg-muted);font-size:12px">No sessions found</div>';
      return;
    }
    data.sessions.forEach((s, i) => {
      const item = document.createElement("div");
      item.className = "session-item" + (i === activeSessionIdx ? " active" : "");
      const name = s.meta.name ? `<div class="sname">${esc(s.meta.name)}</div>` : "";
      const model = s.meta.model ? ` · ${esc(s.meta.model)}` : "";
      const entries = `${s.entries.length} entries · ${s.branches.length} branch(es)`;
      item.innerHTML =
        `${name}` +
        `<div class="sid">${esc(s.meta.id)}</div>` +
        `<div class="smeta">${esc(fmtTime(s.meta.updated_at))}${model}</div>` +
        `<div class="smeta">${entries}</div>`;
      item.onclick = () => selectSession(i);
      list.appendChild(item);
    });
  }

  // ── Select session ────────────────────────────────────────────────
  function selectSession(idx) {
    activeSessionIdx = idx;
    activeBranchIdx = 0;
    // Default to the active branch.
    const s = data.sessions[idx];
    if (s) {
      const ai = s.branches.findIndex((b) => b.is_active);
      if (ai >= 0) activeBranchIdx = ai;
    }
    renderSidebar();
    renderMain();
  }

  // ── Render main ───────────────────────────────────────────────────
  function renderMain() {
    const main = $("main-content");
    main.className = "main";
    if (activeSessionIdx < 0 || !data.sessions[activeSessionIdx]) {
      main.className = "empty-state";
      main.textContent = "Select a session";
      return;
    }
    const s = data.sessions[activeSessionIdx];

    // Branch bar (only if >1 branch).
    let branchBar = "";
    if (s.branches.length > 1) {
      const tabs = s.branches.map((b, i) => {
        const cls = "branch-tab" + (i === activeBranchIdx ? " active" : "") + (b.is_active ? " active-leaf" : "");
        const label = b.label ? esc(b.label) : `#${i + 1}`;
        return `<span class="${cls}" data-branch="${i}">${label} (${b.path.length})</span>`;
      }).join("");
      branchBar = `<div class="branch-bar"><span class="label">Branches:</span>${tabs}</div>`;
    }

    main.innerHTML =
      `<div class="main-header">` +
        `<h1>${esc(s.meta.name || s.meta.id)}</h1>` +
        `<span class="badge">${s.entries.length} entries</span>` +
        `<span class="badge">${s.branches.length} branch(es)</span>` +
        (s.meta.model ? `<span class="badge model">${esc(s.meta.model)}</span>` : "") +
        `<span class="badge">${esc(fmtTime(s.meta.created_at))}</span>` +
      `</div>` +
      branchBar +
      `<div class="messages" id="messages"></div>`;

    if (s.branches.length > 1) {
      main.querySelectorAll(".branch-tab").forEach((tab) => {
        tab.onclick = () => {
          activeBranchIdx = parseInt(tab.dataset.branch, 10);
          renderMain();
        };
      });
    }

    renderMessages(s);
  }

  // ── Render messages for active branch ─────────────────────────────
  function renderMessages(s) {
    const container = $("messages");
    container.innerHTML = "";
    if (!s.branches.length) {
      container.innerHTML = '<div class="empty-state">No entries</div>';
      return;
    }
    const branch = s.branches[activeBranchIdx] || s.branches[0];
    // Map entry ID → entry for quick lookup.
    const byId = {};
    s.entries.forEach((e) => { byId[e.id] = e; });
    // Walk branch path root-first.
    branch.path.forEach((eid) => {
      const e = byId[eid];
      if (!e) return;
      container.appendChild(renderEntry(e, s));
    });
  }

  // ── Render one entry ──────────────────────────────────────────────
  function renderEntry(e, s) {
    const p = e.payload || {};
    const etype = p.entry_type || "unknown";
    const div = document.createElement("div");

    // Non-message entry types.
    if (etype !== "message") {
      div.className = "cfg-entry";
      div.innerHTML = renderConfigEntry(etype, p, e);
      return div;
    }

    // Message entry.
    const role = p.role || "unknown";
    div.className = "msg " + role;
    const headerParts = [];
    headerParts.push(`<span class="msg-role ${role}">${esc(role)}</span>`);
    if (p.kind) {
      headerParts.push(`<span class="msg-kind ${esc(p.kind)}">${esc(p.kind)}</span>`);
    }
    if (p.is_error) {
      headerParts.push(`<span class="msg-kind" style="color:var(--error)">error</span>`);
    }
    if (p.model) {
      headerParts.push(`<span class="msg-kind">${esc(p.model)}</span>`);
    }
    headerParts.push(`<span class="msg-time">${esc(fmtTime(e.timestamp))}</span>`);

    let body = "";
    if (role === "tool_result") {
      body = renderToolResult(p);
    } else if (p.content && Array.isArray(p.content)) {
      body = p.content.map(renderBlock).join("");
    }

    let usage = "";
    if (p.usage) {
      const u = p.usage;
      const parts = [];
      if (u.input_tokens) parts.push(`<span>in:${u.input_tokens}</span>`);
      if (u.output_tokens) parts.push(`<span>out:${u.output_tokens}</span>`);
      if (u.reasoning_tokens) parts.push(`<span>reason:${u.reasoning_tokens}</span>`);
      if (u.cache_read_tokens) parts.push(`<span>cache_r:${u.cache_read_tokens}</span>`);
      if (u.cache_creation_tokens) parts.push(`<span>cache_w:${u.cache_creation_tokens}</span>`);
      if (parts.length) usage = `<div class="msg-usage">${parts.join("")}</div>`;
    }

    if (p.error_message) {
      body += `<div class="msg-error">⚠ ${esc(p.error_message)}</div>`;
    }

    div.innerHTML =
      `<div class="msg-header">${headerParts.join("")}</div>` +
      body + usage;
    return div;
  }

  function renderConfigEntry(etype, p, e) {
    const tag = `<span class="cfg-tag">${esc(etype)}</span>`;
    let detail = "";
    switch (etype) {
      case "model_change":
        detail = `→ ${esc(p.to)}${p.provider ? ` (${esc(p.provider)})` : ""}`;
        break;
      case "thinking_level_change":
        detail = `→ ${esc(p.to)}`;
        break;
      case "active_tools_change":
        detail = `→ ${(p.active || []).map(esc).join(", ") || "(empty)"}`;
        break;
      case "compaction":
        detail = `tokens_before: ${p.tokens_before || "?"} · from_hook: ${!!p.from_hook}`;
        break;
      case "label":
        detail = `🔖 ${esc(p.name)}`;
        break;
      case "session_info":
        detail = `name = ${esc(p.name)}`;
        break;
      case "branch_point":
        detail = `from: ${esc(p.from)}${p.label ? ` · ${esc(p.label)}` : ""}`;
        break;
      case "branch_summary":
        detail = `leaf: ${shortId(p.leaf_id)} · tokens: ${p.token_count || "?"}`;
        break;
      case "custom":
        detail = `type: ${esc(p.type)}`;
        break;
      default:
        detail = `<code>${esc(JSON.stringify(p))}</code>`;
    }
    return `${tag}<span>${detail}</span>`;
  }

  // ── Render content blocks ─────────────────────────────────────────
  function renderBlock(b) {
    if (!b || !b.type) return "";
    switch (b.type) {
      case "text": {
        const empty = !b.text;
        return `<div class="block block-text${empty ? " empty" : ""}">${empty ? "(empty text)" : esc(b.text)}</div>`;
      }
      case "thinking":
        return (
          `<details class="block block-thinking">` +
          `<summary>💭 thinking</summary>` +
          `<div class="thinking-body">${esc(b.thinking || "")}</div>` +
          `</details>`
        );
      case "tool_use": {
        const input = b.input ? JSON.stringify(b.input, null, 2) : "{}";
        return (
          `<details class="block block-tool-use">` +
          `<summary class="tu-header">` +
          `<span class="tu-name">🔧 ${esc(b.name)}</span>` +
          `<span class="tu-id">${esc(b.id)}</span>` +
          `</summary>` +
          `<pre class="tu-input">${esc(input)}</pre>` +
          `</details>`
        );
      }
      case "image": {
        const src = b.source;
        if (src && src.base64) {
          return `<div class="block block-image"><img src="data:${esc(src.media_type)};base64,${esc(src.data)}" /></div>`;
        }
        return `<div class="block">(image)</div>`;
      }
      default:
        return `<div class="block"><code>${esc(JSON.stringify(b))}</code></div>`;
    }
  }

  function renderToolResult(p) {
    const cls = "tool-result-content" + (p.is_error ? " is-error" : "");
    let text = "";
    if (p.content && Array.isArray(p.content)) {
      text = p.content.map((b) => {
        if (b.type === "text") return b.text || "";
        return JSON.stringify(b);
      }).join("\n");
    }
    return `<div class="${cls}">${esc(text) || "(empty)"}</div>`;
  }

  // ── Init ──────────────────────────────────────────────────────────
  renderSidebar();
  if (data.sessions.length === 1) {
    selectSession(0);
  }
})();
</script>
</body>
</html>
